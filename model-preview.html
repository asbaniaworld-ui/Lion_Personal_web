<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI建模 · GLB</title>
    <style>
      :root {
        --paper: #fdfbf7;
        --ink: #0e0e0e;
        --muted: rgba(14, 14, 14, 0.62);
        --rule: rgba(14, 14, 14, 0.14);
        --chip: rgba(255, 255, 255, 0.7);
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        color: var(--ink);
        background: var(--paper);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.18;
        background-image:
          url("data:image/svg+xml,%3Csvg viewBox='0 0 260 260' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/%3E%3C/svg%3E");
        mix-blend-mode: multiply;
      }

      .wrap {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        padding: 14px 16px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        border-bottom: 1px solid var(--rule);
        background: linear-gradient(to bottom, rgba(253, 251, 247, 0.92), rgba(253, 251, 247, 0.72));
        backdrop-filter: blur(8px);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .header-main {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        min-width: 0;
      }

      .back-home {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(14, 14, 14, 0.18);
        background: var(--chip);
        color: var(--ink);
        font-size: 12px;
        font-weight: 600;
        text-decoration: none;
        white-space: nowrap;
        transition: background 0.15s ease;
      }

      .back-home:hover,
      .back-home:focus-visible {
        background: rgba(255, 255, 255, 0.92);
        outline: none;
      }

      .title {
        display: grid;
        gap: 2px;
        min-width: 0;
      }

      .title strong {
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .title span {
        font-size: 12px;
        color: var(--muted);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: flex-end;
      }

      .chip, select, button {
        border: 1px solid rgba(14, 14, 14, 0.18);
        background: var(--chip);
        color: var(--ink);
        border-radius: 999px;
        padding: 8px 10px;
        font-size: 12px;
      }

      select { padding-right: 28px; }

      button {
        cursor: pointer;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.92);
      }

      main {
        position: relative;
        min-height: 0;
      }

      model-viewer {
        width: 100%;
        height: 100%;
        background: transparent;
      }

      .mv-loading {
        position: absolute;
        inset: 0;
        z-index: 4;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
        background: rgba(253, 251, 247, 0.88);
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }

      .mv-loading.is-done {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .mv-loading__inner {
        max-width: 280px;
        line-height: 1.55;
        color: var(--muted);
        font-weight: 500;
      }

      .hint {
        position: absolute;
        left: 12px;
        bottom: 12px;
        max-width: min(520px, 92vw);
        font-size: 12px;
        line-height: 1.5;
        color: var(--muted);
        background: rgba(253, 251, 247, 0.84);
        border: 1px solid rgba(14, 14, 14, 0.12);
        border-radius: 14px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hint code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        color: rgba(14, 14, 14, 0.82);
      }
    </style>

    <!-- model-viewer (Web Components) -->
    <script
      type="module"
      src="./libs/model-viewer/model-viewer.min.js"
    ></script>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="header-main">
          <a class="back-home" href="index.html#works" aria-label="返回个人主页 Works">← 返回个人主页</a>
          <div class="title">
            <strong>AI建模</strong>
            <span>Rotate, zoom, and inspect the GLB export.</span>
          </div>
        </div>
        <div class="controls">
          <span class="chip">Source</span>
          <select id="src">
            <option value="models/model-draco.glb" selected>model-draco.glb (Draco · 更小)</option>
            <option value="models/model.glb">model.glb (original · 更大)</option>
          </select>
          <button id="reset" type="button">Reset view</button>
        </div>
      </header>

      <main>
        <div id="mvLoading" class="mv-loading" aria-live="polite" aria-busy="true">
          <div>
            <div>正在加载模型…</div>
            <div class="mv-loading__inner">默认使用 Draco 压缩版（体积更小）。若长时间空白，可在右上角切换为另一份模型。</div>
          </div>
        </div>
        <model-viewer
          id="viewer"
          src="models/model-draco.glb"
          poster="models/image.png"
          camera-controls
          touch-action="pan-y"
          shadow-intensity="0.08"
          exposure="1"
          environment-image="neutral"
          camera-orbit="30deg 70deg 2.6m"
          min-camera-orbit="auto auto 0.2m"
          max-camera-orbit="auto auto 20m"
          autoplay="false"
        ></model-viewer>

        <div class="hint">
          If this page shows a blank viewer when opened via <code>file://</code>, run a local server in the <code>TEST</code>
          folder (for example: <code>npx serve .</code>) and open the provided <code>http://localhost:…/model-preview.html</code>.
        </div>
      </main>
    </div>

    <script>
      const viewer = document.getElementById("viewer");
      const src = document.getElementById("src");
      const reset = document.getElementById("reset");
      const mvLoading = document.getElementById("mvLoading");

      function showModelLoading() {
        if (!mvLoading) return;
        mvLoading.classList.remove("is-done");
        mvLoading.setAttribute("aria-busy", "true");
        const msg = mvLoading.querySelector(".mv-loading__inner");
        if (msg) {
          msg.textContent =
            "默认使用 Draco 压缩版（体积更小）。若长时间空白，可在右上角切换为另一份模型。";
        }
      }

      function hideModelLoading() {
        if (!mvLoading) return;
        mvLoading.classList.add("is-done");
        mvLoading.setAttribute("aria-busy", "false");
      }

      viewer.addEventListener("load", hideModelLoading);
      viewer.addEventListener("error", () => {
        if (!mvLoading) return;
        mvLoading.classList.remove("is-done");
        mvLoading.setAttribute("aria-busy", "false");
        const first = mvLoading.querySelector("div > div:first-child");
        if (first) first.textContent = "模型加载失败";
        const msg = mvLoading.querySelector(".mv-loading__inner");
        if (msg) {
          msg.textContent = "请尝试切换右上角模型来源，或检查网络后刷新页面。";
        }
      });

      src.addEventListener("change", () => {
        showModelLoading();
        viewer.src = src.value;
      });

      reset.addEventListener("click", () => {
        viewer.cameraOrbit = "30deg 70deg 2.6m";
        viewer.fieldOfView = "30deg";
      });

      if (location.protocol === "file:") {
        const hint = document.querySelector(".hint");
        if (hint) {
          hint.innerHTML =
            'You opened this page via <code>file://</code>. Browsers block loading <code>.glb</code> files here (CORS).<br/>' +
            'Open it via the local server instead: <code>http://localhost:5173/model-preview.html</code>';
        }
      }
    </script>
    <script>
      window.si = window.si || function () {
        (window.siq = window.siq || []).push(arguments);
      };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
    <script>
      window.va = window.va || function () {
        (window.vaq = window.vaq || []).push(arguments);
      };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
