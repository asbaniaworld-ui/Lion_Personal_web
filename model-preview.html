<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Model Preview · GLB</title>
    <style>
      :root {
        --paper: #fdfbf7;
        --ink: #0e0e0e;
        --muted: rgba(14, 14, 14, 0.62);
        --rule: rgba(14, 14, 14, 0.14);
        --chip: rgba(255, 255, 255, 0.7);
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        color: var(--ink);
        background: var(--paper);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.18;
        background-image:
          url("data:image/svg+xml,%3Csvg viewBox='0 0 260 260' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/%3E%3C/svg%3E");
        mix-blend-mode: multiply;
      }

      .wrap {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        padding: 14px 16px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--rule);
        background: linear-gradient(to bottom, rgba(253, 251, 247, 0.92), rgba(253, 251, 247, 0.72));
        backdrop-filter: blur(8px);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .title {
        display: grid;
        gap: 2px;
      }

      .title strong {
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .title span {
        font-size: 12px;
        color: var(--muted);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: flex-end;
      }

      .chip, select, button {
        border: 1px solid rgba(14, 14, 14, 0.18);
        background: var(--chip);
        color: var(--ink);
        border-radius: 999px;
        padding: 8px 10px;
        font-size: 12px;
      }

      select { padding-right: 28px; }

      button {
        cursor: pointer;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.92);
      }

      main {
        position: relative;
        min-height: 0;
      }

      model-viewer {
        width: 100%;
        height: 100%;
        background: transparent;
      }

      .hint {
        position: absolute;
        left: 12px;
        bottom: 12px;
        max-width: min(520px, 92vw);
        font-size: 12px;
        line-height: 1.5;
        color: var(--muted);
        background: rgba(253, 251, 247, 0.84);
        border: 1px solid rgba(14, 14, 14, 0.12);
        border-radius: 14px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
      }

      .hint code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        color: rgba(14, 14, 14, 0.82);
      }
    </style>

    <!-- model-viewer (Web Components) -->
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="title">
          <strong>Model preview</strong>
          <span>Rotate, zoom, and inspect the GLB export.</span>
        </div>
        <div class="controls">
          <span class="chip">Source</span>
          <select id="src">
            <option value="models/model.glb">model.glb (original)</option>
            <option value="models/model-draco.glb">model-draco.glb (Draco)</option>
          </select>
          <button id="reset" type="button">Reset view</button>
        </div>
      </header>

      <main>
        <model-viewer
          id="viewer"
          src="models/model.glb"
          camera-controls
          touch-action="pan-y"
          shadow-intensity="0.2"
          exposure="1"
          environment-image="neutral"
          camera-orbit="30deg 70deg 2.6m"
          min-camera-orbit="auto auto 0.2m"
          max-camera-orbit="auto auto 20m"
          autoplay="false"
        ></model-viewer>

        <div class="hint">
          If this page shows a blank viewer when opened via <code>file://</code>, run a local server in the <code>TEST</code>
          folder (for example: <code>npx serve .</code>) and open the provided <code>http://localhost:…/model-preview.html</code>.
        </div>
      </main>
    </div>

    <script>
      const viewer = document.getElementById("viewer");
      const src = document.getElementById("src");
      const reset = document.getElementById("reset");

      src.addEventListener("change", () => {
        viewer.src = src.value;
      });

      reset.addEventListener("click", () => {
        viewer.cameraOrbit = "30deg 70deg 2.6m";
        viewer.fieldOfView = "30deg";
      });

      if (location.protocol === "file:") {
        const hint = document.querySelector(".hint");
        if (hint) {
          hint.innerHTML =
            'You opened this page via <code>file://</code>. Browsers block loading <code>.glb</code> files here (CORS).<br/>' +
            'Open it via the local server instead: <code>http://localhost:5173/model-preview.html</code>';
        }
      }
    </script>
  </body>
</html>
