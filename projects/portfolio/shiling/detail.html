<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 13 - 详情页</title>
    <link rel="stylesheet" href="detail-styles.css">
</head>
<body>
    <div class="detail-container">
        <a href="index.html" class="back-button">← 返回首页</a>

        <!-- 物品图片 -->
        <div class="item-image-section">
            <img src="assets/placeholder-item.svg" alt="iPhone 13">
        </div>

        <!-- 物品信息 -->
        <div class="item-info-section">
            <h1 class="item-title">iPhone 13</h1>
            
            <div class="item-meta">
                <span class="type-badge found">招领</span>
                <span class="item-date">发布时间：2024-01-15</span>
            </div>

            <!-- 物品类型 -->
            <div class="info-block">
                <div class="info-label">物品类型</div>
                <div class="info-content">电子产品 - 手机</div>
            </div>

            <!-- 发现位置 -->
            <div class="info-block">
                <div class="info-label">发现位置</div>
                <div class="info-content">📍 图书馆二楼</div>
            </div>

            <!-- 详细描述 -->
            <div class="info-block">
                <div class="info-label">详细描述</div>
                <div class="item-description">
                    <p>黑色iPhone 13，在图书馆二楼捡到。手机有蓝色手机壳保护，外观完好无损。</p>
                    <p>手机型号：iPhone 13 (256GB)</p>
                    <p>特征：蓝色硅胶手机壳，屏幕有贴膜</p>
                    <p>如有失主认领，请提供准确的手机特征或锁屏密码验证。</p>
                </div>
            </div>

            <!-- 联系方式 -->
            <div class="contact-section">
                <div class="info-label">联系方式</div>
                <div class="contact-info">
                    <span class="contact-label">联系电话：</span>
                    <span class="contact-value">138****5678</span>
                </div>
                <div class="contact-info" style="margin-top: 0.75rem;">
                    <span class="contact-label">微信/QQ：</span>
                    <span class="contact-value">wxid_2024abc</span>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="action-buttons">
                <a href="tel:13800005678" class="btn btn-primary">联系Ta</a>
                <a href="index.html" class="btn btn-secondary">返回首页</a>
            </div>
        </div>
    </div>
    <script src="detail-dynamic.js"></script>
</body>
</html>
