<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据探索 · 豆瓣电影数据表</title>
  <style>
    :root {
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Source Sans 3", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 20% 20%, #f7efe2, #f2f5fb 45%, #e7edf8 100%);
      color: #1e2a3a;
    }
    .card {
      width: min(680px, 92vw);
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(30, 42, 58, 0.12);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(38, 56, 82, 0.12);
    }
    h1 { margin: 0 0 12px; font-size: 26px; }
    p { margin: 0 0 18px; line-height: 1.7; color: #3d4f66; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(30, 42, 58, 0.16);
      text-decoration: none;
      font-weight: 600;
      color: #1e2a3a;
      background: #fff;
    }
    .btn-primary {
      color: #fff;
      border-color: #234f9f;
      background: linear-gradient(120deg, #2d63c5, #234f9f);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>豆瓣电影数据表</h1>
    <p>这是 Works 中「数据探索」项目的数据入口页。你可以下载 CSV，也可以一键返回个人主页继续浏览。</p>
    <div class="actions">
      <a class="btn btn-primary" href="../../../assets/data/douban_movies.csv" download="douban_movies.csv">下载 CSV</a>
      <a class="btn" href="../../../index.html#works">← 返回个人主页</a>
    </div>
  </main>
</body>
</html>
